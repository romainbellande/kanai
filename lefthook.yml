pre-commit:
  parallel: true
  jobs:
    - name: typecheck
      run: uv --directory ./api run pyrefly check --summarize-errors
      glob: "./api/*.py"

    - name: tests
      run: uv --directory ./api run pytest -n auto -qq --show-capture=no --color=no
      glob: "./api/*.py"

    - name: lint
      run: uv --directory ./api run ruff check . --fix
      stage_fixed: true
      glob: "./api/*.py"

    - name: format
      run: uv --directory ./api run ruff format
      stage_fixed: true
      glob: "./api/*.py"